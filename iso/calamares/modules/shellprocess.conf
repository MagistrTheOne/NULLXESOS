---
dontChroot: false
timeout: 600
verbose: true

script:
    # Initialise snapper for btrfs rollback.
    - "if mountpoint -q /.snapshots; then umount /.snapshots || true; rmdir /.snapshots || true; fi"
    - "snapper -c root create-config /"
    - "snapper -c root create --description 'post-install'"
    # Enable user-level NULLXES units globally for all new accounts.
    - "systemctl --global enable nullxes-notif.service nullxes-portal.service"
    # Ensure greetd uses the production config (not the autologin one).
    - "test -f /etc/greetd/config.toml || ln -sf /etc/greetd/config.toml.production /etc/greetd/config.toml"
