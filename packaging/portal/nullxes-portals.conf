# NULLXES portal backend mapping.
# Installed at /usr/share/xdg-desktop-portal/nullxes-portals.conf
# Selected when XDG_CURRENT_DESKTOP=nullxes.
#
# wlr backend: ScreenCast / ScreenShot via wlr-screencopy (FRAME exposes it).
# gtk backend: file pickers, account, settings, etc.

[preferred]
default            = wlr;gtk
org.freedesktop.impl.portal.ScreenCast = wlr
org.freedesktop.impl.portal.Screenshot = wlr
org.freedesktop.impl.portal.FileChooser = gtk
org.freedesktop.impl.portal.OpenURI    = gtk
org.freedesktop.impl.portal.Notification = gtk
org.freedesktop.impl.portal.Settings   = gtk
